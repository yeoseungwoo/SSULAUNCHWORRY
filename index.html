<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>망한숭실대 상권에서도 밥은 먹자</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="settings-bar">
      <button id="theme-toggle" title="테마 변경">Black mode</button>
      <select id="lang-select">
        <option value="ko">한국어 (KR)</option>
        <option value="en">English (EN)</option>
      </select>
    </div>
    <h1 id="main-title">망한숭실대 상권에서도 밥은 먹자 🍱</h1>
    <p id="main-subtitle">숭실대학교 주변의 "진흙 속의 진주" 같은 식당을 추천해드립니다.</p>
  </header>

  <main>
    <div id="map-container">
      <div id="map"></div>
      <div id="controls">
        <button id="recommend-btn">오늘 뭐 먹지? (랜덤 추천)</button>
      </div>
    </div>

    <!-- Disqus Comment Section -->
    <div id="comment-section">
      <div id="disqus_thread"></div>
      <script>
          (function() { // DON'T EDIT BELOW THIS LINE
          var d = document, s = d.createElement('script');
          s.src = 'https://ssulaunchworry.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <div id="result-panel" class="hidden">
      <div class="result-card">
        <button id="exit-result" class="exit-btn">&times;</button>
        <h2 id="place-name">식당 이름</h2>
        <p id="place-address">식당 주소</p>
        <div class="place-info">
          <span id="place-rating">⭐ 0.0</span>
          <span id="place-status">영업 중</span>
        </div>
        <button id="close-result">다시 추천받기</button>
      </div>
    </div>
  </main>

  <div id="loader" class="hidden">
    <div class="spinner"></div>
    <p id="loader-text">맛집 찾는 중...</p>
  </div>

  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBb8JWF-ka8WoacluxXBv5nwamc216ggvo&libraries=places&language=ko&region=KR"></script>
  <script defer src="main.js"></script>
</body>
</html>
